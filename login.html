<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #4facfe, #00f2fe);
    }

    .login-container{
      background: white;
      padding: 35px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .login-container h2{
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    .input-group{
      margin-bottom: 18px;
    }

    .input-group label{
      display: block;
      margin-bottom: 6px;
      color: #555;
      font-weight: bold;
    }

    .input-group input{
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: 0.3s;
    }

    .input-group input:focus{
      border-color: #4facfe;
    }

    .btn-login{
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-login:hover{
      background: #2196f3;
    }

    .footer{
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .footer a{
      text-decoration: none;
      color: #2196f3;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h2>Form Login</h2>

    <form>
      <div class="input-group">
        <label>Username</label>
        <input type="text" placeholder="Masukkan username" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Masukkan password" required>
      </div>

      <button type="submit" class="btn-login">Login</button>
    </form>

    <div class="footer">
      Belum punya akun?
      <a href="#">Daftar</a>
    </div>
  </div>

</body>
</html>
