<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halaman Registrasi</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background: white;
        padding: 35px;
        width: 350px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      .container h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
      }

      .input-group {
        margin-bottom: 18px;
      }

      .input-group label {
        display: block;
        margin-bottom: 6px;
        color: #555;
        font-weight: bold;
      }

      .input-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        outline: none;
        transition: 0.3s;
      }

      .input-group input:focus {
        border-color: #4facfe;
      }

      .password-box {
        position: relative;
      }

      .password-box input {
        padding-right: 45px;
      }

      .password-box span {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        user-select: none;
        font-size: 18px;
      }

      .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #4facfe;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn:hover {
        background: #2196f3;
      }

      .footer {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
      }

      .footer a {
        text-decoration: none;
        color: #2196f3;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Form Registrasi</h2>

      <form id="registerForm">
        <div class="input-group">
          <label>Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Masukkan username"
            required
          />
        </div>

        <div class="input-group">
          <label>Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Masukkan email"
            required
          />
        </div>

        <div class="input-group">
          <label>Password</label>

          <div class="password-box">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Masukkan password"
              required
            />
          </div>
        </div>

        <button type="submit" class="btn">Daftar</button>

        <div class="footer">
          Sudah punya akun?
          <a href="login.html">Login</a>
        </div>
      </form>
    </div>
  </body>
  <script>
    const registerForm = document.getElementById("registerForm");

    registerForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const username = document.getElementById("username").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const response = await fetch("http://localhost:3000/register", {
          method: "POST",
          headers: {
            "content-Type": "application/json",
          },
          body: JSON.stringify({ username, email, password }),
        });

        const result = await response.json();

        if (response.ok) {
          alert("Registrasi Berhasil! Silahkan Login Ulang...");

          window.location.href = "login.html";
        } else {
          alert(result.message || "Registrasi gagal!");
        }
      } catch (error) {
        console.log("Error:", error);
        alert("Terjadi kesalahan pada server.");
      }
    });
  </script>
</html>
